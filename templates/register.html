<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация | Saccerdotti</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #1a1a2e; color: white; }
        form { background: white; padding: 30px; border-radius: 10px; color: #333; display: flex; flex-direction: column; width: 300px; }
        input { margin-bottom: 15px; padding: 10px; border-radius: 5px; border: 1px solid #ccc; }
        button { background: #1a73e8; color: white; padding: 10px; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <form action="/register" method="post">
        <h2 style="text-align: center;">Регистрация</h2>
        <input type="text" name="username" placeholder="Придумай логин" required>
        <input type="password" name="password" placeholder="Придумай пароль" required>
        <button type="submit">Создать аккаунт</button>
        <p style="font-size: 12px; text-align: center;">Уже есть аккаунт? <a href="/login">Войти</a></p>
    </form>
</body>
</html>
