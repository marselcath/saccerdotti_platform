<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход | Saccerdotti</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
            background: #1a1a2e; /* Тот же темный фон, что и в сайдбаре */
            color: white; 
        }
        .login-card { 
            background: white; 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            color: #333; 
            width: 350px; 
        }
        h2 { text-align: center; color: #1a1a2e; margin-bottom: 25px; }
        input { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 20px; 
            border-radius: 8px; 
            border: 1px solid #ddd; 
            box-sizing: border-box; 
            font-size: 16px;
        }
        button { 
            width: 100%; 
            background: #1a73e8; 
            color: white; 
            padding: 12px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 16px;
            transition: background 0.3s;
        }
        button:hover { background: #1557b0; }
        .footer-links { 
            text-align: center; 
            margin-top: 20px; 
            font-size: 14px; 
            color: #666; 
        }
        .footer-links a { color: #1a73e8; text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Вход в платформу</h2>
        <form action="/login" method="post">
            <input type="text" name="username" placeholder="Твой логин" required>
            <input type="password" name="password" placeholder="Пароль" required>
            <button type="submit">Войти</button>
        </form>
        <div class="footer-links">
            Нет аккаунта? <a href="/register">Зарегистрироваться</a>
        </div>
    </div>
</body>
</html>
